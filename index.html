<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#19171f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css" rel="stylesheet">
  <title>Movie Night</title>
</head>
<body>
  <section class="splide" aria-label="Movie Night">

    <header class="app-header">
      <span class="app-title">Movie Night</span>
    </header>

    <div class="splide__track">
      <div class="splide__list">

        <!-- Slide 1 : Tirage -->
        <div class="splide__slide slide--picker">
          <p class="slide-label">Année du film<br>de la prochaine séance</p>
          <button class="glowing-btn" onclick="getMovieYear(1970, 2023)">
            <span class="glowing-txt">G<span class="faulty-letter">O</span></span>
          </button>
          <div class="result-display-wrapper">
            <p class="result-display">xxxx</p>
          </div>
        </div>

        <!-- Slide 2 : Formulaire -->
        <div class="splide__slide slide--form">
          <div class="form-wrapper">
            <h2 class="slide-heading">Ajouter au journal</h2>
            <form id="journal-form">
              <div class="form-group">
                <label for="movie-title">Titre du film</label>
                <input type="text" id="movie-title" placeholder="ex. Jurassic Park" required>
              </div>
              <div class="form-group">
                <label for="release-year">Année de sortie</label>
                <input type="number" id="release-year" placeholder="ex. 1993" min="1888" max="2030" required>
              </div>
              <div class="form-group">
                <label for="picked-by">Choisi par</label>
                <input type="text" id="picked-by" placeholder="Prénom" required>
              </div>
              <div class="form-group">
                <label for="watch-date">Date de visionnage</label>
                <input type="date" id="watch-date" required>
              </div>
              <button type="submit" class="form-submit">Ajouter</button>
            </form>
          </div>
        </div>

        <!-- Slide 3 : Journal -->
        <div class="splide__slide slide--journal">
          <div class="journal-wrapper">
            <h2 class="slide-heading">Journal</h2>
            <div id="journal-entries"></div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script>
    new Splide('.splide', {
      type: 'loop',
      arrows: false,
      pagination: true,
    }).mount();
  </script>
  <script src="myscripts.js"></script>
</body>
</html>
